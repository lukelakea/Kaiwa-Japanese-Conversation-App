name: CI

on:
  push:
    branches: [main, working]
  pull_request:

# Lint, type-check, test, and build both halves of the app. No live Ollama,
# VOICEVOX, or compiled dictionary is needed: the tests are unit-level and stub
# the model and network (see backend/tests and frontend/src/**/*.test.ts).
jobs:
  frontend:
    name: Frontend (lint · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  backend:
    name: Backend (ruff · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
